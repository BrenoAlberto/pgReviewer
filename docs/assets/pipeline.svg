<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 400" width="860" height="400"
     font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="hBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="hSlate" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <linearGradient id="hAmber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="hGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#15803d"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="hPurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="hTeal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0e7490"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="400" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Title -->
  <text x="430" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">pgReviewer — Analysis Pipeline</text>

  <!-- ═══ COLUMN 1: INPUTS (x=16) ═══ -->

  <!-- pgr check -->
  <g filter="url(#shadow)">
    <rect x="16" y="48" width="130" height="72" rx="8" fill="url(#cardBg)" stroke="#e2e8f0"/>
    <rect x="16" y="48" width="130" height="24" rx="8" fill="url(#hSlate)"/>
    <rect x="16" y="64" width="130" height="8" fill="url(#hSlate)"/>
    <text x="81" y="63" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">pgr check</text>
    <text x="81" y="87" text-anchor="middle" font-size="9.5" fill="#475569">SQL query (inline)</text>
    <text x="81" y="103" text-anchor="middle" font-size="9.5" fill="#475569">or -f query.sql</text>
  </g>

  <!-- pgr diff -->
  <g filter="url(#shadow)">
    <rect x="16" y="136" width="130" height="84" rx="8" fill="url(#cardBg)" stroke="#e2e8f0"/>
    <rect x="16" y="136" width="130" height="24" rx="8" fill="url(#hSlate)"/>
    <rect x="16" y="152" width="130" height="8" fill="url(#hSlate)"/>
    <text x="81" y="151" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">pgr diff</text>
    <text x="81" y="175" text-anchor="middle" font-size="9.5" fill="#475569">PR diff / patch file</text>
    <text x="81" y="189" text-anchor="middle" font-size="9.5" fill="#475569">--git-ref HEAD~1</text>
    <text x="81" y="203" text-anchor="middle" font-size="9.5" fill="#475569">--staged</text>
  </g>

  <!-- arrows from inputs → parse -->
  <line x1="146" y1="84" x2="174" y2="84" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="146" y1="178" x2="174" y2="178" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══ COLUMN 2: PARSE (x=176) ═══ -->

  <!-- EXPLAIN Runner -->
  <g filter="url(#shadow)">
    <rect x="176" y="48" width="130" height="72" rx="8" fill="url(#cardBg)" stroke="#e2e8f0"/>
    <rect x="176" y="48" width="130" height="24" rx="8" fill="url(#hBlue)"/>
    <rect x="176" y="64" width="130" height="8" fill="url(#hBlue)"/>
    <text x="241" y="63" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">EXPLAIN Runner</text>
    <text x="241" y="87" text-anchor="middle" font-size="9.5" fill="#475569">FORMAT JSON, COSTS</text>
    <text x="241" y="103" text-anchor="middle" font-size="9.5" fill="#475569">VERBOSE, SETTINGS</text>
  </g>

  <!-- Diff Parser + Extractor -->
  <g filter="url(#shadow)">
    <rect x="176" y="136" width="130" height="84" rx="8" fill="url(#cardBg)" stroke="#e2e8f0"/>
    <rect x="176" y="136" width="130" height="24" rx="8" fill="url(#hBlue)"/>
    <rect x="176" y="152" width="130" height="8" fill="url(#hBlue)"/>
    <text x="241" y="151" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Diff Parser</text>
    <text x="241" y="175" text-anchor="middle" font-size="9.5" fill="#475569">unidiff → changed files</text>
    <text x="241" y="189" text-anchor="middle" font-size="9.5" fill="#475569">file classifier</text>
    <text x="241" y="203" text-anchor="middle" font-size="9.5" fill="#475569">tree-sitter extractor</text>
  </g>

  <!-- arrows parse → analysis -->
  <line x1="306" y1="84" x2="334" y2="84" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="306" y1="178" x2="334" y2="178" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══ COLUMN 3: ANALYSIS (x=336) — tall block ═══ -->

  <!-- EXPLAIN + Detectors -->
  <g filter="url(#shadow)">
    <rect x="336" y="48" width="150" height="72" rx="8" fill="url(#cardBg)" stroke="#e2e8f0"/>
    <rect x="336" y="48" width="150" height="24" rx="8" fill="url(#hAmber)"/>
    <rect x="336" y="64" width="150" height="8" fill="url(#hAmber)"/>
    <text x="411" y="63" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Plan Detectors</text>
    <text x="411" y="87" text-anchor="middle" font-size="9.5" fill="#475569">seq_scan · missing_index</text>
    <text x="411" y="103" text-anchor="middle" font-size="9.5" fill="#475569">nested_loop · cartesian</text>
  </g>

  <!-- Migration detectors -->
  <g filter="url(#shadow)">
    <rect x="336" y="136" width="150" height="60" rx="8" fill="url(#cardBg)" stroke="#e2e8f0"/>
    <rect x="336" y="136" width="150" height="24" rx="8" fill="url(#hAmber)"/>
    <rect x="336" y="152" width="150" height="8" fill="url(#hAmber)"/>
    <text x="411" y="151" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Migration Detectors</text>
    <text x="411" y="175" text-anchor="middle" font-size="9.5" fill="#475569">fk_without_index · lock risks</text>
    <text x="411" y="189" text-anchor="middle" font-size="9.5" fill="#475569">destructive_ddl · 8 detectors</text>
  </g>

  <!-- N+1 + Model detectors -->
  <g filter="url(#shadow)">
    <rect x="336" y="212" width="150" height="60" rx="8" fill="url(#cardBg)" stroke="#e2e8f0"/>
    <rect x="336" y="212" width="150" height="24" rx="8" fill="url(#hAmber)"/>
    <rect x="336" y="228" width="150" height="8" fill="url(#hAmber)"/>
    <text x="411" y="227" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Code Patterns</text>
    <text x="411" y="251" text-anchor="middle" font-size="9.5" fill="#475569">query_in_loop (N+1)</text>
    <text x="411" y="265" text-anchor="middle" font-size="9.5" fill="#475569">SQLAlchemy model diff</text>
  </g>

  <!-- arrows analysis → correlate -->
  <line x1="486" y1="84" x2="514" y2="130" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="486" y1="166" x2="514" y2="150" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="486" y1="242" x2="514" y2="170" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══ COLUMN 4: CORRELATE + HYPOPG (x=516) ═══ -->

  <!-- HypoPG Validation -->
  <g filter="url(#shadow)">
    <rect x="516" y="48" width="150" height="72" rx="8" fill="url(#cardBg)" stroke="#e2e8f0"/>
    <rect x="516" y="48" width="150" height="24" rx="8" fill="url(#hGreen)"/>
    <rect x="516" y="64" width="150" height="8" fill="url(#hGreen)"/>
    <text x="591" y="63" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">HypoPG Validation</text>
    <text x="591" y="87" text-anchor="middle" font-size="9.5" fill="#475569">hypothetical index → re-EXPLAIN</text>
    <text x="591" y="103" text-anchor="middle" font-size="9.5" fill="#475569">cost before → after (always rollback)</text>
  </g>

  <!-- Cross-cutting / Workload -->
  <g filter="url(#shadow)">
    <rect x="516" y="136" width="150" height="72" rx="8" fill="url(#cardBg)" stroke="#e2e8f0"/>
    <rect x="516" y="136" width="150" height="24" rx="8" fill="url(#hTeal)"/>
    <rect x="516" y="152" width="150" height="8" fill="url(#hTeal)"/>
    <text x="591" y="151" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Correlate</text>
    <text x="591" y="175" text-anchor="middle" font-size="9.5" fill="#475569">cross-cutting findings</text>
    <text x="591" y="189" text-anchor="middle" font-size="9.5" fill="#475569">workload (pg_stat_statements)</text>
    <text x="591" y="200" text-anchor="middle" font-size="9.5" fill="#475569">LLM for complex plans</text>
  </g>

  <!-- arrows → output -->
  <line x1="666" y1="84" x2="694" y2="100" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="666" y1="172" x2="694" y2="148" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══ COLUMN 5: OUTPUT (x=696) ═══ -->

  <g filter="url(#shadow)">
    <rect x="696" y="60" width="148" height="112" rx="8" fill="url(#cardBg)" stroke="#e2e8f0"/>
    <rect x="696" y="60" width="148" height="24" rx="8" fill="url(#hPurple)"/>
    <rect x="696" y="76" width="148" height="8" fill="url(#hPurple)"/>
    <text x="770" y="75" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Output</text>
    <text x="770" y="102" text-anchor="middle" font-size="9.5" fill="#475569">Rich terminal report</text>
    <text x="770" y="116" text-anchor="middle" font-size="9.5" fill="#475569">PR comment (GitHub)</text>
    <text x="770" y="130" text-anchor="middle" font-size="9.5" fill="#475569">JSON (--json)</text>
    <text x="770" y="144" text-anchor="middle" font-size="9.5" fill="#475569">CI exit code (--ci)</text>
    <text x="770" y="158" text-anchor="middle" font-size="9.5" fill="#475569">CREATE INDEX stmts</text>
  </g>

  <!-- ═══ LEGEND ═══ -->
  <g transform="translate(16, 300)">
    <rect x="0" y="0" width="828" height="84" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="414" y="18" text-anchor="middle" font-size="10" font-weight="600" fill="#64748b">LEGEND</text>

    <rect x="16" y="28" width="10" height="10" rx="2" fill="url(#hSlate)"/>
    <text x="32" y="38" font-size="9.5" fill="#475569">Entry points</text>

    <rect x="120" y="28" width="10" height="10" rx="2" fill="url(#hBlue)"/>
    <text x="136" y="38" font-size="9.5" fill="#475569">Parse &amp; extract</text>

    <rect x="248" y="28" width="10" height="10" rx="2" fill="url(#hAmber)"/>
    <text x="264" y="38" font-size="9.5" fill="#475569">Detection (algorithmic)</text>

    <rect x="420" y="28" width="10" height="10" rx="2" fill="url(#hGreen)"/>
    <text x="436" y="38" font-size="9.5" fill="#475569">HypoPG validation (always rolled back)</text>

    <rect x="636" y="28" width="10" height="10" rx="2" fill="url(#hTeal)"/>
    <text x="652" y="38" font-size="9.5" fill="#475569">Correlation &amp; LLM</text>

    <rect x="16" y="56" width="10" height="10" rx="2" fill="url(#hPurple)"/>
    <text x="32" y="66" font-size="9.5" fill="#475569">Output</text>

    <text x="120" y="66" font-size="9.5" fill="#64748b">Zero side effects — read-only by default. HypoPG writes run in always-rollback transactions. EXPLAIN only (never ANALYZE).</text>
  </g>
</svg>
