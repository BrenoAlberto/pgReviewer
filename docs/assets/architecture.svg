<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 488"
     font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="gSlate" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <linearGradient id="gBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="gAmber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="gGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#15803d"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="gPurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.07"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="760" height="488" rx="14" fill="#fff" stroke="#e2e8f0"/>
  <text x="380" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">System Architecture</text>

  <!-- ── Row 1: CLI (y=40) ── -->
  <g filter="url(#sh)">
    <rect x="16" y="40" width="728" height="56" rx="8" fill="url(#cardBg)" stroke="#e2e8f0"/>
    <rect x="16" y="40" width="728" height="22" rx="8" fill="url(#gSlate)"/>
    <rect x="16" y="54" width="728" height="8" fill="url(#gSlate)"/>
    <text x="380" y="55" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">CLI  (Typer)</text>
    <text x="380" y="80" text-anchor="middle" font-size="10" fill="#475569">pgr check  ·  pgr diff  ·  pgr workload  ·  pgr catalog  ·  pgr cost  ·  pgr debug  ·  pgr config  ·  pgr backend  ·  pgr db</text>
  </g>

  <line x1="380" y1="96" x2="380" y2="114" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Row 2: Parsing (y=116) ── -->
  <text x="380" y="112" text-anchor="middle" font-size="9" fill="#94a3b8">pgr diff only</text>

  <!-- Diff Parser -->
  <g filter="url(#sh)">
    <rect x="16" y="118" width="232" height="72" rx="8" fill="url(#cardBg)" stroke="#e2e8f0"/>
    <rect x="16" y="118" width="232" height="22" rx="8" fill="url(#gBlue)"/>
    <rect x="16" y="132" width="232" height="8" fill="url(#gBlue)"/>
    <text x="132" y="133" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Diff Parser</text>
    <text x="132" y="156" text-anchor="middle" font-size="9.5" fill="#475569">unidiff → ChangedFile[]</text>
    <text x="132" y="170" text-anchor="middle" font-size="9.5" fill="#475569">added lines only, path-filtered</text>
  </g>

  <!-- File Classifier -->
  <g filter="url(#sh)">
    <rect x="264" y="118" width="232" height="72" rx="8" fill="url(#cardBg)" stroke="#e2e8f0"/>
    <rect x="264" y="118" width="232" height="22" rx="8" fill="url(#gBlue)"/>
    <rect x="264" y="132" width="232" height="8" fill="url(#gBlue)"/>
    <text x="380" y="133" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">File Classifier</text>
    <text x="380" y="156" text-anchor="middle" font-size="9.5" fill="#475569">MIGRATION_SQL · MIGRATION_PYTHON</text>
    <text x="380" y="170" text-anchor="middle" font-size="9.5" fill="#475569">PYTHON_WITH_SQL · IGNORE</text>
  </g>

  <!-- SQL Extractor -->
  <g filter="url(#sh)">
    <rect x="512" y="118" width="232" height="72" rx="8" fill="url(#cardBg)" stroke="#e2e8f0"/>
    <rect x="512" y="118" width="232" height="22" rx="8" fill="url(#gBlue)"/>
    <rect x="512" y="132" width="232" height="8" fill="url(#gBlue)"/>
    <text x="628" y="133" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">SQL Extractor</text>
    <text x="628" y="156" text-anchor="middle" font-size="9.5" fill="#475569">tree-sitter (Python AST)</text>
    <text x="628" y="170" text-anchor="middle" font-size="9.5" fill="#475569">migration split · op.execute()</text>
  </g>

  <line x1="380" y1="190" x2="380" y2="208" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Row 3: Analysis Engine (y=210) ── -->
  <!-- EXPLAIN + Detectors -->
  <g filter="url(#sh)">
    <rect x="16" y="210" width="174" height="88" rx="8" fill="url(#cardBg)" stroke="#e2e8f0"/>
    <rect x="16" y="210" width="174" height="22" rx="8" fill="url(#gAmber)"/>
    <rect x="16" y="224" width="174" height="8" fill="url(#gAmber)"/>
    <text x="103" y="225" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">EXPLAIN Analysis</text>
    <text x="103" y="248" text-anchor="middle" font-size="9.5" fill="#475569">plan detectors (×6)</text>
    <text x="103" y="262" text-anchor="middle" font-size="9.5" fill="#475569">index suggester</text>
    <text x="103" y="276" text-anchor="middle" font-size="9.5" fill="#475569">HypoPG validation</text>
  </g>

  <!-- Migration Detectors -->
  <g filter="url(#sh)">
    <rect x="204" y="210" width="174" height="88" rx="8" fill="url(#cardBg)" stroke="#e2e8f0"/>
    <rect x="204" y="210" width="174" height="22" rx="8" fill="url(#gAmber)"/>
    <rect x="204" y="224" width="174" height="8" fill="url(#gAmber)"/>
    <text x="291" y="225" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Migration Safety</text>
    <text x="291" y="248" text-anchor="middle" font-size="9.5" fill="#475569">migration detectors (×8)</text>
    <text x="291" y="262" text-anchor="middle" font-size="9.5" fill="#475569">file-level context</text>
    <text x="291" y="276" text-anchor="middle" font-size="9.5" fill="#475569">SQLAlchemy model diff</text>
  </g>

  <!-- Code Patterns -->
  <g filter="url(#sh)">
    <rect x="392" y="210" width="174" height="88" rx="8" fill="url(#cardBg)" stroke="#e2e8f0"/>
    <rect x="392" y="210" width="174" height="22" rx="8" fill="url(#gAmber)"/>
    <rect x="392" y="224" width="174" height="8" fill="url(#gAmber)"/>
    <text x="479" y="225" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Code Patterns</text>
    <text x="479" y="248" text-anchor="middle" font-size="9.5" fill="#475569">query_in_loop (N+1)</text>
    <text x="479" y="262" text-anchor="middle" font-size="9.5" fill="#475569">cross-file (query catalog)</text>
    <text x="479" y="276" text-anchor="middle" font-size="9.5" fill="#475569">call graph (2 levels)</text>
  </g>

  <!-- LLM + Workload -->
  <g filter="url(#sh)">
    <rect x="580" y="210" width="164" height="88" rx="8" fill="url(#cardBg)" stroke="#e2e8f0"/>
    <rect x="580" y="210" width="164" height="22" rx="8" fill="url(#gAmber)"/>
    <rect x="580" y="224" width="164" height="8" fill="url(#gAmber)"/>
    <text x="662" y="225" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">LLM + Workload</text>
    <text x="662" y="248" text-anchor="middle" font-size="9.5" fill="#475569">complex plan interpretation</text>
    <text x="662" y="262" text-anchor="middle" font-size="9.5" fill="#475569">cross-cutting findings</text>
    <text x="662" y="276" text-anchor="middle" font-size="9.5" fill="#475569">pg_stat_statements</text>
  </g>

  <line x1="380" y1="298" x2="380" y2="316" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Row 4: Infrastructure (y=318) ── -->
  <!-- Local Backend -->
  <g filter="url(#sh)">
    <rect x="16" y="318" width="232" height="72" rx="8" fill="url(#cardBg)" stroke="#e2e8f0"/>
    <rect x="16" y="318" width="232" height="22" rx="8" fill="url(#gGreen)"/>
    <rect x="16" y="332" width="232" height="8" fill="url(#gGreen)"/>
    <text x="132" y="333" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Local Backend</text>
    <text x="132" y="356" text-anchor="middle" font-size="9.5" fill="#475569">asyncpg pool  ·  HypoPG</text>
    <text x="132" y="370" text-anchor="middle" font-size="9.5" fill="#475569">read-only · always-rollback writes</text>
  </g>

  <!-- MCP Backend -->
  <g filter="url(#sh)">
    <rect x="264" y="318" width="232" height="72" rx="8" fill="url(#cardBg)" stroke="#e2e8f0"/>
    <rect x="264" y="318" width="232" height="22" rx="8" fill="url(#gGreen)"/>
    <rect x="264" y="332" width="232" height="8" fill="url(#gGreen)"/>
    <text x="380" y="333" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">MCP Backend</text>
    <text x="380" y="356" text-anchor="middle" font-size="9.5" fill="#475569">Postgres MCP Pro  ·  SSE</text>
    <text x="380" y="370" text-anchor="middle" font-size="9.5" fill="#475569">fallback → local when unavailable</text>
  </g>

  <!-- Infra -->
  <g filter="url(#sh)">
    <rect x="512" y="318" width="232" height="72" rx="8" fill="url(#cardBg)" stroke="#e2e8f0"/>
    <rect x="512" y="318" width="232" height="22" rx="8" fill="url(#gPurple)"/>
    <rect x="512" y="332" width="232" height="8" fill="url(#gPurple)"/>
    <text x="628" y="333" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Infrastructure</text>
    <text x="628" y="356" text-anchor="middle" font-size="9.5" fill="#475569">debug store  ·  cost guardrail</text>
    <text x="628" y="370" text-anchor="middle" font-size="9.5" fill="#475569">LLM client  ·  structured output</text>
  </g>

  <!-- ── Core bar (y=416) ── -->
  <g filter="url(#sh)">
    <rect x="16" y="414" width="728" height="32" rx="6" fill="#f1f5f9" stroke="#e2e8f0"/>
    <text x="380" y="434" text-anchor="middle" font-size="10" fill="#64748b">
      <tspan font-weight="600" fill="#475569">Core  </tspan>
      models.py  ·  severity.py  ·  degradation.py  ·  config.py  ·  exceptions.py
    </text>
  </g>

  <!-- ── Output bar (y=458) ── -->
  <g filter="url(#sh)">
    <rect x="16" y="454" width="728" height="26" rx="6" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="380" y="471" text-anchor="middle" font-size="10" fill="#1d4ed8">
      <tspan font-weight="600">Output  </tspan>
      Rich terminal  ·  PR comment (GitHub)  ·  JSON  ·  CI exit code
    </text>
  </g>
</svg>
