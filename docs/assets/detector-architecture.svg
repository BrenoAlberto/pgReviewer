<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 380" width="640" height="380" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="d_amber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d97706" />
      <stop offset="100%" style="stop-color:#f59e0b" />
    </linearGradient>
    <linearGradient id="d_blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#336791" />
      <stop offset="100%" style="stop-color:#4a7faa" />
    </linearGradient>
    <filter id="d_shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <marker id="d_arrow" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="640" height="380" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="320" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">Pluggable Detector Architecture</text>

  <!-- BaseDetector ABC -->
  <g filter="url(#d_shadow)">
    <rect x="215" y="45" width="210" height="60" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
    <rect x="215" y="45" width="210" height="22" rx="8" fill="url(#d_blue)"/>
    <rect x="215" y="59" width="210" height="8" fill="url(#d_blue)"/>
    <text x="320" y="62" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">BaseDetector (ABC)</text>
    <text x="320" y="82" text-anchor="middle" font-size="9" fill="#475569" font-family="monospace">name: str</text>
    <text x="320" y="96" text-anchor="middle" font-size="9" fill="#475569" font-family="monospace">detect(plan, schema) → Issue[]</text>
  </g>

  <!-- Lines from BaseDetector to each detector -->
  <line x1="255" y1="105" x2="100" y2="145" stroke="#cbd5e1" stroke-width="1.2"/>
  <line x1="290" y1="105" x2="230" y2="145" stroke="#cbd5e1" stroke-width="1.2"/>
  <line x1="320" y1="105" x2="360" y2="145" stroke="#cbd5e1" stroke-width="1.2"/>
  <line x1="360" y1="105" x2="490" y2="145" stroke="#cbd5e1" stroke-width="1.2"/>

  <!-- Row 1 of detectors -->
  <g filter="url(#d_shadow)">
    <rect x="20" y="148" width="160" height="50" rx="6" fill="#fffbeb" stroke="#fde68a"/>
    <text x="100" y="170" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">sequential_scan</text>
    <text x="100" y="186" text-anchor="middle" font-size="8" fill="#b45309">Seq Scan on large tables</text>
  </g>

  <g filter="url(#d_shadow)">
    <rect x="200" y="148" width="160" height="50" rx="6" fill="#fffbeb" stroke="#fde68a"/>
    <text x="280" y="170" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">missing_index_on_filter</text>
    <text x="280" y="186" text-anchor="middle" font-size="8" fill="#b45309">Filter without index</text>
  </g>

  <g filter="url(#d_shadow)">
    <rect x="380" y="148" width="160" height="50" rx="6" fill="#fffbeb" stroke="#fde68a"/>
    <text x="460" y="170" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">nested_loop_large</text>
    <text x="460" y="186" text-anchor="middle" font-size="8" fill="#b45309">Nested loop, large outer</text>
  </g>

  <!-- More lines for row 2 -->
  <line x1="255" y1="105" x2="100" y2="218" stroke="#cbd5e1" stroke-width="1.2" opacity="0"/>

  <!-- Row 2 of detectors -->
  <g filter="url(#d_shadow)">
    <rect x="20" y="215" width="160" height="50" rx="6" fill="#fffbeb" stroke="#fde68a"/>
    <text x="100" y="237" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">high_cost</text>
    <text x="100" y="253" text-anchor="middle" font-size="8" fill="#b45309">Cost exceeds threshold</text>
  </g>

  <g filter="url(#d_shadow)">
    <rect x="200" y="215" width="160" height="50" rx="6" fill="#fffbeb" stroke="#fde68a"/>
    <text x="280" y="237" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">sort_without_index</text>
    <text x="280" y="253" text-anchor="middle" font-size="8" fill="#b45309">Sort, no covering index</text>
  </g>

  <g filter="url(#d_shadow)">
    <rect x="380" y="215" width="160" height="50" rx="6" fill="#fef2f2" stroke="#fecaca"/>
    <text x="460" y="237" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b">cartesian_join</text>
    <text x="460" y="253" text-anchor="middle" font-size="8" fill="#dc2626">Always CRITICAL</text>
  </g>

  <!-- DetectorRegistry -->
  <g filter="url(#d_shadow)">
    <rect x="130" y="290" width="380" height="70" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
    <rect x="130" y="290" width="380" height="22" rx="8" fill="url(#d_amber)"/>
    <rect x="130" y="304" width="380" height="8" fill="url(#d_amber)"/>
    <text x="320" y="307" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">DetectorRegistry</text>
    <text x="320" y="330" text-anchor="middle" font-size="9" fill="#475569">Auto-discovers all BaseDetector subclasses</text>
    <text x="320" y="346" text-anchor="middle" font-size="9" fill="#475569">Filters by DISABLED_DETECTORS config</text>
  </g>

  <!-- Arrows from detectors to registry -->
  <line x1="100" y1="265" x2="240" y2="288" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="280" y1="265" x2="300" y2="288" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="460" y1="265" x2="400" y2="288" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Add your own note -->
  <rect x="540" y="148" width="86" height="52" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-dasharray="4,3"/>
  <text x="583" y="170" text-anchor="middle" font-size="9" font-weight="600" fill="#1e40af">Your</text>
  <text x="583" y="184" text-anchor="middle" font-size="9" font-weight="600" fill="#1e40af">Detector</text>
  <line x1="425" y1="105" x2="583" y2="145" stroke="#bfdbfe" stroke-width="1.2" stroke-dasharray="4,3"/>
</svg>
