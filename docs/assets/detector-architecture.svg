<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420"
     font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="gBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="gAmber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="gTeal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0e7490"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="gGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#15803d"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.07"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="760" height="420" rx="14" fill="#fff" stroke="#e2e8f0"/>
  <text x="380" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">Detector Architecture</text>

  <!-- ── Column 1: EXPLAIN Detectors (x=16) ── -->
  <g filter="url(#sh)">
    <rect x="16" y="44" width="228" height="260" rx="8" fill="url(#cardBg)" stroke="#e2e8f0"/>
    <rect x="16" y="44" width="228" height="24" rx="8" fill="url(#gAmber)"/>
    <rect x="16" y="60" width="228" height="8" fill="url(#gAmber)"/>
    <text x="130" y="61" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">EXPLAIN Detectors</text>
    <text x="130" y="88" text-anchor="middle" font-size="9" fill="#64748b">detect(plan, schema) → Issue[]</text>
    <!-- items -->
    <text x="32" y="112" font-size="10" font-weight="600" fill="#92400e">sequential_scan</text>
    <text x="32" y="126" font-size="9" fill="#64748b">Seq scan on large tables</text>
    <text x="32" y="148" font-size="10" font-weight="600" fill="#92400e">missing_index_on_filter</text>
    <text x="32" y="162" font-size="9" fill="#64748b">Filter without index</text>
    <text x="32" y="184" font-size="10" font-weight="600" fill="#92400e">nested_loop_large_outer</text>
    <text x="32" y="198" font-size="9" fill="#64748b">Nested loop, large outer set</text>
    <text x="32" y="220" font-size="10" font-weight="600" fill="#92400e">high_cost</text>
    <text x="32" y="234" font-size="9" fill="#64748b">Total cost above threshold</text>
    <text x="32" y="256" font-size="10" font-weight="600" fill="#92400e">sort_without_index</text>
    <text x="32" y="270" font-size="9" fill="#64748b">Sort, no covering index</text>
    <text x="32" y="292" font-size="10" font-weight="600" fill="#b91c1c">cartesian_join</text>
    <text x="32" y="306" font-size="9" fill="#64748b">Join without condition — always CRITICAL</text>
  </g>

  <!-- ── Column 2: Migration Detectors (x=266) ── -->
  <g filter="url(#sh)">
    <rect x="266" y="44" width="228" height="260" rx="8" fill="url(#cardBg)" stroke="#e2e8f0"/>
    <rect x="266" y="44" width="228" height="24" rx="8" fill="url(#gTeal)"/>
    <rect x="266" y="60" width="228" height="8" fill="url(#gTeal)"/>
    <text x="380" y="61" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Migration Detectors</text>
    <text x="380" y="88" text-anchor="middle" font-size="9" fill="#64748b">detect(migration, schema) → Issue[]</text>
    <!-- items -->
    <text x="282" y="112" font-size="10" font-weight="600" fill="#b91c1c">add_foreign_key_without_index</text>
    <text x="282" y="126" font-size="9" fill="#64748b">FK without index — always CRITICAL</text>
    <text x="282" y="148" font-size="10" font-weight="600" fill="#b91c1c">add_not_null_without_default</text>
    <text x="282" y="162" font-size="9" fill="#64748b">NOT NULL addition, table rewrite</text>
    <text x="282" y="184" font-size="10" font-weight="600" fill="#92400e">add_column_with_default</text>
    <text x="282" y="198" font-size="9" fill="#64748b">Non-trivial default pre-PG11</text>
    <text x="282" y="220" font-size="10" font-weight="600" fill="#92400e">create_index_not_concurrently</text>
    <text x="282" y="234" font-size="9" fill="#64748b">Write lock on index creation</text>
    <text x="282" y="256" font-size="10" font-weight="600" fill="#b91c1c">alter_column_type</text>
    <text x="282" y="270" font-size="9" fill="#64748b">Column type change, table rewrite</text>
    <text x="282" y="292" font-size="10" font-weight="600" fill="#92400e">destructive_ddl</text>
    <text x="282" y="306" font-size="9" fill="#64748b">DROP TABLE · DROP COLUMN · TRUNCATE</text>
  </g>

  <!-- ── Column 3: Code Pattern Detectors (x=516) ── -->
  <g filter="url(#sh)">
    <rect x="516" y="44" width="228" height="260" rx="8" fill="url(#cardBg)" stroke="#e2e8f0"/>
    <rect x="516" y="44" width="228" height="24" rx="8" fill="url(#gBlue)"/>
    <rect x="516" y="60" width="228" height="8" fill="url(#gBlue)"/>
    <text x="630" y="61" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Code Pattern Detectors</text>
    <text x="630" y="88" text-anchor="middle" font-size="9" fill="#64748b">detect(files, catalog) → Issue[]</text>
    <!-- items -->
    <text x="532" y="112" font-size="10" font-weight="600" fill="#1d4ed8">query_in_loop</text>
    <text x="532" y="126" font-size="9" fill="#64748b">DB call inside for / while loop</text>
    <text x="532" y="148" font-size="10" font-weight="600" fill="#1d4ed8">cross-file N+1</text>
    <text x="532" y="162" font-size="9" fill="#64748b">Loop calls repository via call graph</text>
    <text x="532" y="184" font-size="10" font-weight="600" fill="#1d4ed8">sqlalchemy_model_diff</text>
    <text x="532" y="198" font-size="9" fill="#64748b">Removed indexes, missing FK indexes</text>
    <text x="532" y="230" font-size="9.5" fill="#64748b" font-style="italic">+ your custom detector</text>
    <text x="532" y="248" font-size="9" fill="#64748b">Drop a file in the detectors</text>
    <text x="532" y="262" font-size="9" fill="#64748b">directory — auto-discovered</text>
  </g>

  <!-- ── Registry bar ── -->
  <line x1="130" y1="304" x2="130" y2="342" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="380" y1="304" x2="380" y2="342" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="630" y1="304" x2="630" y2="342" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <g filter="url(#sh)">
    <rect x="16" y="344" width="728" height="52" rx="8" fill="url(#cardBg)" stroke="#e2e8f0"/>
    <rect x="16" y="344" width="728" height="22" rx="8" fill="url(#gGreen)"/>
    <rect x="16" y="358" width="728" height="8" fill="url(#gGreen)"/>
    <text x="380" y="359" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">DetectorRegistry</text>
    <text x="380" y="382" text-anchor="middle" font-size="9.5" fill="#475569">
      Auto-discovers all BaseDetector / BaseMigrationDetector subclasses  ·  Filters disabled detectors from config  ·  Runs appropriate family per analysis type
    </text>
  </g>
</svg>
