<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340"
     font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="gSlate" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <linearGradient id="gBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="gAmber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="gTeal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0e7490"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="gPurple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.07"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="760" height="340" rx="14" fill="#fff" stroke="#e2e8f0"/>
  <text x="380" y="26" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">pgr diff  — File Processing Flow</text>

  <!-- ── Row 1: Input sources ── -->
  <!-- Source 1 -->
  <g filter="url(#sh)">
    <rect x="16" y="40" width="158" height="58" rx="8" fill="url(#cardBg)" stroke="#e2e8f0"/>
    <rect x="16" y="40" width="158" height="20" rx="8" fill="url(#gSlate)"/>
    <rect x="16" y="52" width="158" height="8" fill="url(#gSlate)"/>
    <text x="95" y="52" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Patch file</text>
    <text x="95" y="74" text-anchor="middle" font-size="9.5" fill="#475569">pgr diff pr.diff</text>
  </g>
  <!-- Source 2 -->
  <g filter="url(#sh)">
    <rect x="192" y="40" width="158" height="58" rx="8" fill="url(#cardBg)" stroke="#e2e8f0"/>
    <rect x="192" y="40" width="158" height="20" rx="8" fill="url(#gSlate)"/>
    <rect x="192" y="52" width="158" height="8" fill="url(#gSlate)"/>
    <text x="271" y="52" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Git ref</text>
    <text x="271" y="74" text-anchor="middle" font-size="9.5" fill="#475569">--git-ref HEAD~1 / main</text>
  </g>
  <!-- Source 3 -->
  <g filter="url(#sh)">
    <rect x="368" y="40" width="158" height="58" rx="8" fill="url(#cardBg)" stroke="#e2e8f0"/>
    <rect x="368" y="40" width="158" height="20" rx="8" fill="url(#gSlate)"/>
    <rect x="368" y="52" width="158" height="8" fill="url(#gSlate)"/>
    <text x="447" y="52" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Staged</text>
    <text x="447" y="74" text-anchor="middle" font-size="9.5" fill="#475569">--staged (pre-commit)</text>
  </g>
  <!-- Source 4 -->
  <g filter="url(#sh)">
    <rect x="544" y="40" width="200" height="58" rx="8" fill="url(#cardBg)" stroke="#e2e8f0"/>
    <rect x="544" y="40" width="200" height="20" rx="8" fill="url(#gSlate)"/>
    <rect x="544" y="52" width="200" height="8" fill="url(#gSlate)"/>
    <text x="644" y="52" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">GitHub PR</text>
    <text x="644" y="74" text-anchor="middle" font-size="9.5" fill="#475569">gh pr diff → /tmp/pr.diff</text>
  </g>

  <!-- arrows converging to parse -->
  <line x1="95" y1="98" x2="260" y2="126" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="271" y1="98" x2="300" y2="126" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="447" y1="98" x2="380" y2="126" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="644" y1="98" x2="480" y2="126" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Row 2: Parse + Classify ── -->
  <g filter="url(#sh)">
    <rect x="180" y="128" width="400" height="58" rx="8" fill="url(#cardBg)" stroke="#e2e8f0"/>
    <rect x="180" y="128" width="400" height="22" rx="8" fill="url(#gBlue)"/>
    <rect x="180" y="142" width="400" height="8" fill="url(#gBlue)"/>
    <text x="380" y="143" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Diff Parser  →  File Classifier</text>
    <text x="380" y="165" text-anchor="middle" font-size="9.5" fill="#475569">unidiff · added lines only · TRIGGER_PATHS filter · IGNORE_PATHS exclusion</text>
  </g>

  <!-- fan-out arrows -->
  <line x1="260" y1="186" x2="100" y2="214" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="310" y1="186" x2="280" y2="214" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="440" y1="186" x2="480" y2="214" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="490" y1="186" x2="650" y2="214" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Row 3: File type boxes ── -->
  <!-- MIGRATION_SQL -->
  <g filter="url(#sh)">
    <rect x="16" y="216" width="168" height="72" rx="8" fill="url(#cardBg)" stroke="#e2e8f0"/>
    <rect x="16" y="216" width="168" height="22" rx="8" fill="url(#gAmber)"/>
    <rect x="16" y="230" width="168" height="8" fill="url(#gAmber)"/>
    <text x="100" y="231" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">MIGRATION_SQL</text>
    <text x="100" y="253" text-anchor="middle" font-size="9" fill="#475569">split by  ;  · comment strip</text>
    <text x="100" y="267" text-anchor="middle" font-size="9" fill="#475569">migration detectors</text>
  </g>

  <!-- MIGRATION_PYTHON -->
  <g filter="url(#sh)">
    <rect x="200" y="216" width="168" height="72" rx="8" fill="url(#cardBg)" stroke="#e2e8f0"/>
    <rect x="200" y="216" width="168" height="22" rx="8" fill="url(#gTeal)"/>
    <rect x="200" y="230" width="168" height="8" fill="url(#gTeal)"/>
    <text x="284" y="231" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">MIGRATION_PYTHON</text>
    <text x="284" y="253" text-anchor="middle" font-size="9" fill="#475569">op.execute()  · Alembic</text>
    <text x="284" y="267" text-anchor="middle" font-size="9" fill="#475569">migration + model diff</text>
  </g>

  <!-- PYTHON_WITH_SQL -->
  <g filter="url(#sh)">
    <rect x="384" y="216" width="168" height="72" rx="8" fill="url(#cardBg)" stroke="#e2e8f0"/>
    <rect x="384" y="216" width="168" height="22" rx="8" fill="url(#gBlue)"/>
    <rect x="384" y="230" width="168" height="8" fill="url(#gBlue)"/>
    <text x="468" y="231" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">PYTHON_WITH_SQL</text>
    <text x="468" y="253" text-anchor="middle" font-size="9" fill="#475569">tree-sitter AST queries</text>
    <text x="468" y="267" text-anchor="middle" font-size="9" fill="#475569">N+1  ·  code patterns</text>
  </g>

  <!-- IGNORE -->
  <g filter="url(#sh)">
    <rect x="568" y="216" width="176" height="72" rx="8" fill="url(#cardBg)" stroke="#e2e8f0"/>
    <rect x="568" y="216" width="176" height="22" rx="8" fill="url(#gPurple)"/>
    <rect x="568" y="230" width="176" height="8" fill="url(#gPurple)"/>
    <text x="656" y="231" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">IGNORE</text>
    <text x="656" y="253" text-anchor="middle" font-size="9" fill="#475569">*.md · *.txt · fixtures</text>
    <text x="656" y="267" text-anchor="middle" font-size="9" fill="#475569">skipped — logged in report</text>
  </g>

  <!-- bottom note -->
  <rect x="16" y="304" width="728" height="26" rx="6" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="380" y="321" text-anchor="middle" font-size="9.5" fill="#15803d">
    All extracted queries share a file-level ParsedMigration — detectors see the full statement context (e.g. CREATE INDEX after ALTER TABLE FK).
  </text>
</svg>
