name: pgReviewer (reusable)

# Public reusable workflow — consumers call:
#
#   uses: BrenoAlberto/pgReviewer/.github/workflows/review.yml@main
#
# Caller workflow needs these triggers and permissions:
#
#   on:
#     issue_comment:  { types: [created] }
#     pull_request:   { types: [opened]  }
#   permissions:
#     contents: read
#     issues: write
#     pull-requests: write
#     checks: write

on:
  workflow_call:
    inputs:
      database-url:
        description: "PostgreSQL connection string (e.g. postgresql://user:pass@host:5432/db)"
        required: true
        type: string
      db-dockerfile-context:
        description: "Path to the directory containing the Dockerfile for the Postgres+HypoPG image"
        required: false
        type: string
        default: "db/"
      run-migrations:
        description: "Run 'alembic upgrade head' before analysis (default: false)"
        required: false
        type: boolean
        default: false
    secrets:
      LLM_API_KEY:
        description: "API key for LLM-assisted analysis (optional)"
        required: false

jobs:
  # ── Welcome comment ─────────────────────────────────────────────────────────
  # Posts when a PR is first opened so reviewers always know the command.
  welcome:
    name: Post /pgr review hint
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Post welcome comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body "$(cat <<'EOF'
          👋 **pgReviewer** is watching this PR.

          Comment \`/pgr review\` at any time to run a full SQL & migration analysis:
          - 🔍 EXPLAIN plan analysis + index recommendations
          - 🛡️ Migration safety checks (locks, destructive DDL, unsafe NOT NULL)
          - 🔄 N+1 / query-in-loop detection
          - 💡 Copy-ready fix suggestions inline

          Results appear as a summary comment + inline review suggestions on the diff.
          EOF
          )"

  # ── On-demand review ─────────────────────────────────────────────────────────
  # Fires when a reviewer comments /pgr review on a PR.
  review:
    name: pgReviewer SQL analysis
    if: >-
      ${{ github.event_name == 'issue_comment' &&
          github.event.issue.pull_request != '' &&
          contains(github.event.comment.body, '/pgr review') }}
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ inputs.database-url }}

    steps:
      # Step 0 — immediately react with 👀 before any expensive setup.
      - name: React with eyes (analysis starting)
        id: ack
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REACTION_ID=$(gh api \
            repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -f content='eyes' \
            --jq '.id' 2>/dev/null || echo "")
          echo "reaction_id=$REACTION_ID" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch PR metadata and checkout PR head
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.issue.number }}
          HEAD_SHA=$(gh api repos/${{ github.repository }}/pulls/$PR_NUMBER --jq '.head.sha')
          # Checkout PR head so source files exist for inline suggestion blocks.
          # issue_comment events default to the base branch — without this,
          # _read_file_line returns None and suggestion diffs cannot be built.
          git fetch origin "$HEAD_SHA"
          git checkout "$HEAD_SHA"
          gh pr diff $PR_NUMBER > /tmp/pr.diff
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"

      - name: Build Postgres+HypoPG image
        run: docker build -t pgreviewer-db ${{ inputs.db-dockerfile-context }}

      - name: Start Postgres
        run: |
          docker run -d --name pgreviewer-db \
            -e POSTGRES_USER=pgreviewer \
            -e POSTGRES_PASSWORD=pgreviewer \
            -e POSTGRES_DB=review_db \
            -p 5432:5432 \
            pgreviewer-db
          for i in $(seq 1 30); do
            pg_isready -h 127.0.0.1 -p 5432 -U pgreviewer && break
            sleep 1
          done

      - name: Enable HypoPG
        run: |
          PGPASSWORD=pgreviewer psql -h 127.0.0.1 -U pgreviewer -d review_db \
            -c "CREATE EXTENSION IF NOT EXISTS hypopg;"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install pgreviewer
        run: uv sync

      - name: Run migrations (optional)
        if: inputs.run-migrations
        run: uv run alembic upgrade head

      - name: Run pgreviewer (JSON report)
        run: uv run pgr diff /tmp/pr.diff --json > /tmp/report.json
        env:
          DATABASE_URL: ${{ inputs.database-url }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        continue-on-error: true

      - name: Post PR comment and inline suggestions
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          COMMIT_SHA: ${{ steps.pr.outputs.head_sha }}
        run: |
          uv run python - <<'PYEOF'
          import json, os, sys
          from pathlib import Path

          try:
              data = json.loads(Path("/tmp/report.json").read_text())
          except Exception as exc:
              print(f"Could not read report: {exc}", file=sys.stderr)
              sys.exit(0)

          from pgreviewer.reporting.comment_manager import (
              post_or_update_comment,
              post_review_with_suggestions,
          )
          from pgreviewer.reporting.diff_comment import format_diff_comment

          pr_number = int(os.environ["PR_NUMBER"])
          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          commit_sha = os.environ["COMMIT_SHA"]

          has_issues = (
              any(r.get("issues") for r in data.get("results", []))
              or any(e.get("model_issues") for e in data.get("model_diffs", []))
              or bool(data.get("cross_cutting_findings"))
              or bool(data.get("code_pattern_issues"))
          )

          # Always post in on-demand mode — the user explicitly requested a review.
          post_or_update_comment(
              pr_number=pr_number, repo=repo, token=token,
              body=format_diff_comment(data),
          )
          if has_issues:
              post_review_with_suggestions(
                  pr_number=pr_number, repo=repo, token=token,
                  report=data, commit_sha=commit_sha,
              )
          print("PR comment posted.")
          PYEOF

      # Reads already-generated JSON — does NOT re-run the analysis.
      - name: Enforce severity threshold
        id: threshold
        run: |
          python - <<'EOF'
          import json, sys
          from pathlib import Path
          data = json.loads(Path("/tmp/report.json").read_text())
          criticals = (
              sum(1 for r in data.get("results", []) for i in r.get("issues", []) if i.get("severity") == "CRITICAL")
              + sum(1 for e in data.get("model_diffs", []) for i in e.get("model_issues", []) if i.get("severity") == "CRITICAL")
              + sum(1 for f in data.get("cross_cutting_findings", []) if f.get("severity") == "CRITICAL")
              + sum(1 for i in data.get("code_pattern_issues", []) if i.get("severity") == "CRITICAL")
          )
          print(f"Severity threshold: critical. Found: {criticals} critical. Result: {'FAIL' if criticals else 'PASS'}")
          sys.exit(1 if criticals else 0)
          EOF

      # Swap 👀 for 🚀 (pass) or 😕 (criticals found). Always runs.
      - name: Update reaction (analysis done)
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REACTION_ID: ${{ steps.ack.outputs.reaction_id }}
          OUTCOME: ${{ steps.threshold.outcome }}
        run: |
          COMMENT_ID=${{ github.event.comment.id }}
          REPO=${{ github.repository }}

          if [ -n "$REACTION_ID" ]; then
            gh api "repos/$REPO/issues/comments/$COMMENT_ID/reactions/$REACTION_ID" \
              --method DELETE -H "Accept: application/vnd.github+json" 2>/dev/null || true
          fi

          FINAL_REACTION="rocket"
          [ "$OUTCOME" != "success" ] && FINAL_REACTION="confused"

          gh api "repos/$REPO/issues/comments/$COMMENT_ID/reactions" \
            --method POST -H "Accept: application/vnd.github+json" \
            -f content="$FINAL_REACTION"
