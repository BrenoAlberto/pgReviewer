name: pgReviewer (reusable)

# Public reusable workflow — consumers call:
#
#   uses: BrenoAlberto/pgReviewer/.github/workflows/review.yml@main
#
# Caller workflow needs these triggers and permissions:
#
#   on:
#     issue_comment:  { types: [created] }
#     pull_request:   { types: [opened]  }
#   permissions:
#     contents: read
#     issues: write
#     pull-requests: write
#     checks: write
#     id-token: write   # required for pgreviewer-ci[bot] identity via token vending service

on:
  workflow_call:
    inputs:
      database-url:
        description: "PostgreSQL connection string (e.g. postgresql://user:pass@host:5432/db). Leave empty to run in static-only mode (no DB analysis). The auto-triggered static review job never requires this."
        required: false
        type: string
        default: ""
      postgres-version:
        description: "PostgreSQL major version for the CI database (e.g. '15'). Leave empty to auto-detect from docker-compose/Dockerfile, falling back to 16."
        required: false
        type: string
        default: ""
      db-dockerfile-context:
        description: "Path to a directory with a custom Postgres Dockerfile (needed only if your migrations require extensions beyond what pgReviewer can auto-detect). Leave empty to use the default Postgres+HypoPG image."
        required: false
        type: string
        default: ""
      python-version:
        description: "Python version for the migration environment (e.g. '3.11'). Leave empty to let uv auto-detect. Useful for Poetry projects where uv cannot read the Python version from pyproject.toml."
        required: false
        type: string
        default: ""
      run-migrations:
        description: "Run 'alembic upgrade head' before analysis (default: false)"
        required: false
        type: boolean
        default: false
    secrets:
      ANTHROPIC_API_KEY:
        description: "Anthropic API key (used when LLM_PROVIDER=anthropic)"
        required: false
      OPENAI_API_KEY:
        description: "OpenAI API key (used when LLM_PROVIDER=openai)"
        required: false
      GEMINI_API_KEY:
        description: "Google Gemini API key (used when LLM_PROVIDER=gemini)"
        required: false
      LLM_API_KEY:
        description: "Generic fallback API key — prefer provider-specific secrets above"
        required: false
      GIT_TOKEN:
        description: "Token for cloning private git dependencies during migration setup. Not needed if your project has no private cross-repo deps. Pass a PAT with repo scope or a GitHub App token."
        required: false

jobs:
  # ── Welcome comment ─────────────────────────────────────────────────────────
  # Posts when a PR is first opened so reviewers always know the command.
  welcome:
    name: Post /pgr review hint
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Get pgreviewer-ci token
        id: bot-token
        run: |
          OIDC_RESPONSE=$(curl -s \
            -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=pgreviewer-token-service" 2>/dev/null) || true
          OIDC_TOKEN=$(echo "$OIDC_RESPONSE" | jq -r '.value // empty' 2>/dev/null) || true
          if [ -z "$OIDC_TOKEN" ]; then
            echo "::warning::Could not obtain OIDC token — id-token:write permission may be missing. Response: $OIDC_RESPONSE"
            echo "token=" >> "$GITHUB_OUTPUT"
            echo "app_installed=false" >> "$GITHUB_OUTPUT"
            echo "missing_permission=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          RESPONSE=$(curl -s -X POST \
            https://pgreviewer-token-service.brenoapsdev.workers.dev/token \
            -H "Authorization: Bearer $OIDC_TOKEN" 2>/dev/null) || true
          TOKEN=$(echo "$RESPONSE" | jq -r '.token // empty' 2>/dev/null) || true
          if [ -z "$TOKEN" ]; then
            echo "::warning::pgreviewer-ci token exchange failed: $RESPONSE"
            echo "token=" >> "$GITHUB_OUTPUT"
            echo "app_installed=false" >> "$GITHUB_OUTPUT"
            echo "missing_permission=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
          echo "app_installed=true" >> "$GITHUB_OUTPUT"
          echo "missing_permission=false" >> "$GITHUB_OUTPUT"

      - name: Post welcome comment
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token || secrets.GITHUB_TOKEN }}
          APP_INSTALLED: ${{ steps.bot-token.outputs.app_installed }}
          MISSING_PERMISSION: ${{ steps.bot-token.outputs.missing_permission }}
        run: |
          cat > /tmp/pgr_welcome.md << 'BODYEOF'
          👋 **pgReviewer** is watching this PR.

          ```
          /pgr review
          ```

          Results appear as a summary comment + inline suggestions on the diff.

          **Checks:** missing FK indexes · dangerous DDL (locks) · N+1 queries · cross-cutting migration/query conflicts

          <details>
          <summary>🤖 Use a different model or skip LLM</summary>

          Add the matching secret in **Settings → Secrets → Actions**, then copy the command.

          #### Anthropic · `ANTHROPIC_API_KEY`

          Balanced _(default)_:
          ```
          /pgr review
          ```
          Most capable:
          ```
          /pgr review --model claude-opus-4-5
          ```
          Fastest · lowest cost:
          ```
          /pgr review --model claude-3-5-haiku-20241022
          ```

          #### OpenAI · `OPENAI_API_KEY`

          Balanced _(default)_:
          ```
          /pgr review --model gpt-4o
          ```
          Fastest · lowest cost:
          ```
          /pgr review --model gpt-4o-mini
          ```
          Reasoning:
          ```
          /pgr review --model o3-mini
          ```
          Reasoning · high cost:
          ```
          /pgr review --model o1
          ```

          #### Gemini · `GEMINI_API_KEY`

          Fastest · lowest cost _(default)_:
          ```
          /pgr review --model gemini-2.0-flash
          ```
          Most capable:
          ```
          /pgr review --model gemini-1.5-pro
          ```
          Fast · low cost:
          ```
          /pgr review --model gemini-1.5-flash
          ```

          #### Skip LLM entirely

          ```
          /pgr review --no-llm
          ```

          </details>
          BODYEOF

          if [ "${MISSING_PERMISSION}" = "true" ]; then
            cat >> /tmp/pgr_welcome.md << 'BODYEOF'

          ---
          ⚠️ **pgreviewer-ci** requires `id-token: write` permission in your caller workflow to post comments as the bot. Add it under `permissions:` and re-open this PR.
          BODYEOF
          elif [ "${APP_INSTALLED}" != "true" ]; then
            cat >> /tmp/pgr_welcome.md << 'BODYEOF'

          ---
          ⚠️ **pgreviewer-ci** is not installed on this repository and may not work as expected. [Install it here](https://github.com/apps/pgreviewer-ci).
          BODYEOF
          fi

          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body-file /tmp/pgr_welcome.md

  # ── Auto static review ───────────────────────────────────────────────────────
  # Fires automatically on every PR push (no DB required).
  # Runs pgr diff in STATIC_ONLY mode and posts/updates a summary comment when
  # issues are found. Full DB analysis is still available via /pgr review.
  static-review:
    name: pgReviewer auto static analysis
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Get pgreviewer-ci token
        id: bot-token
        run: |
          OIDC_RESPONSE=$(curl -s \
            -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=pgreviewer-token-service" 2>/dev/null) || true
          OIDC_TOKEN=$(echo "$OIDC_RESPONSE" | jq -r '.value // empty' 2>/dev/null) || true
          if [ -z "$OIDC_TOKEN" ]; then
            echo "::warning::Could not obtain OIDC token — id-token:write permission may be missing."
            echo "token=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          RESPONSE=$(curl -s -X POST \
            https://pgreviewer-token-service.brenoapsdev.workers.dev/token \
            -H "Authorization: Bearer $OIDC_TOKEN" 2>/dev/null) || true
          TOKEN=$(echo "$RESPONSE" | jq -r '.token // empty' 2>/dev/null) || true
          if [ -z "$TOKEN" ]; then
            echo "::warning::pgreviewer-ci token exchange failed: $RESPONSE"
            echo "token=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch PR diff and head SHA
        id: pr
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token || secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          HEAD_SHA=${{ github.event.pull_request.head.sha }}
          git fetch origin "$HEAD_SHA"
          git checkout "$HEAD_SHA"
          gh pr diff $PR_NUMBER > /tmp/pr.diff
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install pgreviewer
        run: uv pip install --system "pgreviewer[llm] @ git+https://github.com/BrenoAlberto/pgReviewer.git@main"

      - name: Run pgreviewer static analysis (JSON report)
        run: |
          set -o pipefail
          pgr diff /tmp/pr.diff --json | tee /tmp/report.json
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        continue-on-error: true

      - name: Post static analysis comment (issues only)
        if: always()
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token || secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          COMMIT_SHA: ${{ steps.pr.outputs.head_sha }}
        run: |
          python - <<'PYEOF'
          import json, os, sys
          from pathlib import Path

          try:
              data = json.loads(Path("/tmp/report.json").read_text())
          except Exception as exc:
              print(f"Could not read report: {exc}", file=sys.stderr)
              sys.exit(0)

          from pgreviewer.reporting.comment_manager import (
              post_or_update_comment,
              post_review_with_suggestions,
          )
          from pgreviewer.reporting.diff_comment import format_diff_comment

          pr_number = int(os.environ["PR_NUMBER"])
          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          commit_sha = os.environ["COMMIT_SHA"]

          has_issues = (
              any(r.get("issues") for r in data.get("results", []))
              or any(e.get("model_issues") for e in data.get("model_diffs", []))
              or bool(data.get("cross_cutting_findings"))
              or bool(data.get("code_pattern_issues"))
          )

          # Auto-trigger mode: only post when issues are found to avoid noise.
          # On re-push (synchronize), the existing comment is updated in place.
          if has_issues:
              post_or_update_comment(
                  pr_number=pr_number, repo=repo, token=token,
                  body=format_diff_comment(data),
              )
              post_review_with_suggestions(
                  pr_number=pr_number, repo=repo, token=token,
                  report=data, commit_sha=commit_sha,
                  diff_path="/tmp/pr.diff",
              )
              print("Static analysis findings posted.")
          else:
              print("No issues found — skipping comment.")
          PYEOF

  # ── On-demand review ─────────────────────────────────────────────────────────
  # Fires when a reviewer comments /pgr review on a PR.
  review:
    name: pgReviewer SQL analysis
    if: >-
      ${{ github.event_name == 'issue_comment' &&
          github.event.issue.pull_request != '' &&
          contains(github.event.comment.body, '/pgr review') &&
          github.event.sender.type != 'Bot' &&
          inputs.database-url != '' }}
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ inputs.database-url }}

    steps:
      # Step 0 — immediately react with 👀 before any expensive setup.
      - name: React with eyes (analysis starting)
        id: ack
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REACTION_ID=$(gh api \
            repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -f content='eyes' \
            --jq '.id' 2>/dev/null || echo "")
          echo "reaction_id=$REACTION_ID" >> "$GITHUB_OUTPUT"

      - name: Get pgreviewer-ci token
        id: bot-token
        run: |
          OIDC_RESPONSE=$(curl -s \
            -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=pgreviewer-token-service" 2>/dev/null) || true
          OIDC_TOKEN=$(echo "$OIDC_RESPONSE" | jq -r '.value // empty' 2>/dev/null) || true
          if [ -z "$OIDC_TOKEN" ]; then
            echo "::warning::Could not obtain OIDC token — id-token:write permission may be missing. Response: $OIDC_RESPONSE"
            echo "token=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          RESPONSE=$(curl -s -X POST \
            https://pgreviewer-token-service.brenoapsdev.workers.dev/token \
            -H "Authorization: Bearer $OIDC_TOKEN" 2>/dev/null) || true
          TOKEN=$(echo "$RESPONSE" | jq -r '.token // empty' 2>/dev/null) || true
          if [ -z "$TOKEN" ]; then
            echo "::warning::pgreviewer-ci token exchange failed: $RESPONSE"
            echo "token=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch PR metadata and checkout PR head
        id: pr
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token || secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.issue.number }}
          HEAD_SHA=$(gh api repos/${{ github.repository }}/pulls/$PR_NUMBER --jq '.head.sha')
          # Checkout PR head so source files exist for inline suggestion blocks.
          # issue_comment events default to the base branch — without this,
          # _read_file_line returns None and suggestion diffs cannot be built.
          git fetch origin "$HEAD_SHA"
          git checkout "$HEAD_SHA"
          gh pr diff $PR_NUMBER > /tmp/pr.diff
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"

      - name: Resolve Postgres version
        id: pg-version
        run: |
          INPUT="${{ inputs.postgres-version }}"
          if [ -n "$INPUT" ]; then
            echo "version=$INPUT" >> "$GITHUB_OUTPUT"
            echo "Postgres version (explicit): $INPUT"
          else
            # Auto-detect from docker-compose / Dockerfile in the caller's repo.
            DETECTED=""
            for f in docker-compose.yml docker-compose.yaml docker-compose.*.yml docker-compose.*.yaml; do
              [ -f "$f" ] || continue
              V=$(grep -oE 'postgres:[0-9]+' "$f" | grep -oE '[0-9]+$' | head -1)
              [ -n "$V" ] && DETECTED="$V" && break
            done
            if [ -z "$DETECTED" ]; then
              for f in Dockerfile Dockerfile.*; do
                [ -f "$f" ] || continue
                V=$(grep -oE 'FROM[[:space:]]+[a-zA-Z0-9._/-]*postgres:[0-9]+' "$f" | grep -oE '[0-9]+$' | head -1)
                [ -n "$V" ] && DETECTED="$V" && break
              done
            fi
            VERSION="${DETECTED:-16}"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            if [ -n "$DETECTED" ]; then
              echo "Postgres version auto-detected: $VERSION"
            else
              echo "Postgres version not detected, using default: $VERSION"
            fi
          fi

      - name: Build Postgres+HypoPG image
        run: |
          if [ -n "${{ inputs.db-dockerfile-context }}" ]; then
            docker build -t pgreviewer-db "${{ inputs.db-dockerfile-context }}"
          else
            PG_VERSION="${{ steps.pg-version.outputs.version }}"
            docker build -t pgreviewer-db - <<DOCKERFILE
          FROM postgres:${PG_VERSION}
          RUN apt-get update && apt-get install -y \
              postgresql-${PG_VERSION}-hypopg \
              && rm -rf /var/lib/apt/lists/*
          DOCKERFILE
          fi

      - name: Start Postgres
        env:
          DATABASE_URL: ${{ inputs.database-url }}
        run: |
          eval $(python3 -c "
          import os
          from urllib.parse import urlparse
          u = urlparse(os.environ['DATABASE_URL'])
          print(f'DB_USER={u.username}')
          print(f'DB_PASS={u.password}')
          print(f'DB_NAME={u.path.lstrip(\"/\")}')
          ")
          docker run -d --name pgreviewer-db \
            -e POSTGRES_USER="$DB_USER" \
            -e POSTGRES_PASSWORD="$DB_PASS" \
            -e POSTGRES_DB="$DB_NAME" \
            -p 5432:5432 \
            pgreviewer-db
          for i in $(seq 1 30); do
            pg_isready -h 127.0.0.1 -p 5432 -U "$DB_USER" && break
            sleep 1
          done

      - name: Enable HypoPG
        env:
          DATABASE_URL: ${{ inputs.database-url }}
        run: |
          eval $(python3 -c "
          import os
          from urllib.parse import urlparse
          u = urlparse(os.environ['DATABASE_URL'])
          print(f'DB_USER={u.username}')
          print(f'DB_PASS={u.password}')
          print(f'DB_NAME={u.path.lstrip(\"/\")}')
          ")
          PGPASSWORD="$DB_PASS" psql -h 127.0.0.1 -U "$DB_USER" -d "$DB_NAME" \
            -c "CREATE EXTENSION IF NOT EXISTS hypopg;"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install caller dependencies
        id: deps
        env:
          GH_TOKEN: ${{ secrets.GIT_TOKEN || steps.bot-token.outputs.token || secrets.GITHUB_TOKEN }}
        run: |
          # Allow package managers to clone private git dependencies.
          # For system git (pip/uv): git config credential rewrite.
          # For Poetry (dulwich): inject token into URLs directly — dulwich
          # ignores git config and .netrc entirely.
          git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"

          if [ -f "poetry.lock" ]; then
            echo "manager=poetry" >> "$GITHUB_OUTPUT"
            pip install poetry
            poetry config virtualenvs.in-project true
            # Use system git instead of dulwich so git config insteadOf works.
            # (Poetry 2.x renamed this from experimental.system-git-client)
            poetry config system-git-client true
            poetry install --no-interaction
          elif [ -f "Pipfile.lock" ]; then
            echo "manager=pipenv" >> "$GITHUB_OUTPUT"
            pip install pipenv
            pipenv install --dev
          else
            echo "manager=uv" >> "$GITHUB_OUTPUT"
            PY_FLAG=""
            [ -n "${{ inputs.python-version }}" ] && PY_FLAG="--python ${{ inputs.python-version }}"
            uv sync $PY_FLAG
          fi

      # Extension detection and migrations run BEFORE pgreviewer is installed.
      # pgreviewer requires pydantic v2; callers that pin pydantic v1 would break
      # if alembic ran after pgreviewer upgraded pydantic in the shared venv.
      - name: Detect and install required Postgres extensions
        if: inputs.run-migrations
        run: |
          PACKAGES=$(python3 - <<'PYEOF'
          import re, sys
          from pathlib import Path

          PG_VERSION = "${{ steps.pg-version.outputs.version }}"

          BUNDLED = frozenset({
              "plpgsql","uuid-ossp","hstore","ltree","citext","pg_trgm","tablefunc",
              "fuzzystrmatch","intarray","isn","lo","earthdistance","cube","dict_int",
              "dict_xsyn","unaccent","xml2","pgcrypto","pg_stat_statements",
              "pg_buffercache","pgrowlocks","pg_prewarm","sslinfo","dblink",
              "postgres_fdw","file_fdw","btree_gin","btree_gist","tcn",
              "tsm_system_rows","tsm_system_time","amcheck","pg_visibility",
              "pageinspect","pgstattuple","plpython3u","plperl","pltcl","hypopg",
          })
          TEMPLATES = {
              "postgis":"postgresql-{pg}-postgis-3",
              "postgis_topology":"postgresql-{pg}-postgis-3",
              "postgis_raster":"postgresql-{pg}-postgis-3",
              "address_standardizer":"postgresql-{pg}-postgis-3",
              "address_standardizer_data_us":"postgresql-{pg}-postgis-3",
              "pgvector":"postgresql-{pg}-pgvector",
              "vector":"postgresql-{pg}-pgvector",
              "pgrouting":"postgresql-{pg}-pgrouting",
              "pg_partman":"postgresql-{pg}-partman",
              "rum":"postgresql-{pg}-rum",
              "orafce":"postgresql-{pg}-orafce",
              "age":"postgresql-{pg}-age",
              "pldebugger":"postgresql-{pg}-pldebugger",
              "plv8":"postgresql-{pg}-plv8",
              "pg_qualstats":"postgresql-{pg}-pg-qualstats",
              "pgtap":"pgtap",
          }
          MIGRATION_DIRS = {"migrations","alembic","versions","flyway"}
          pattern = re.compile(
              r"CREATE\s+EXTENSION\s+(?:IF\s+NOT\s+EXISTS\s+)?[\"']?(\w[\w-]*)[\"']?",
              re.IGNORECASE,
          )
          extensions = set()
          for path in Path(".").rglob("*"):
              if not path.is_file():
                  continue
              parts = {p.lower() for p in path.parts}
              if not (parts & MIGRATION_DIRS and path.suffix in {".sql", ".py"}):
                  continue
              try:
                  extensions |= {m.group(1).lower() for m in pattern.finditer(
                      path.read_text(encoding="utf-8", errors="ignore")
                  )}
              except OSError:
                  pass
          packages, unknown, seen = [], [], set()
          for ext in sorted(extensions):
              if ext in BUNDLED:
                  continue
              if ext in TEMPLATES:
                  pkg = TEMPLATES[ext].format(pg=PG_VERSION)
                  if pkg not in seen:
                      packages.append(pkg)
                      seen.add(pkg)
              else:
                  unknown.append(ext)
          if unknown:
              print(
                  f"::error::Extensions with no known apt mapping: {unknown}\n"
                  "Provide a custom 'db-dockerfile-context' Dockerfile.",
                  file=sys.stderr,
              )
              sys.exit(1)
          print(" ".join(packages))
          PYEOF
          )
          if [ -n "$PACKAGES" ]; then
            docker exec pgreviewer-db bash -c "apt-get update -qq && apt-get install -y $PACKAGES"
          fi

      - name: Run migrations (optional)
        if: inputs.run-migrations
        run: |
          case "${{ steps.deps.outputs.manager }}" in
            poetry) poetry run alembic upgrade head ;;
            pipenv) pipenv run alembic upgrade head ;;
            *)
              PY_FLAG=""
              [ -n "${{ inputs.python-version }}" ] && PY_FLAG="--python ${{ inputs.python-version }}"
              uv run $PY_FLAG --with alembic alembic upgrade head ;;
          esac

      - name: Install pgreviewer
        run: uv pip install "pgreviewer[llm] @ git+https://github.com/BrenoAlberto/pgReviewer.git@main"

      - name: Parse --model and --no-llm from comment
        id: model
        run: |
          COMMENT="${{ github.event.comment.body }}"
          MODEL=$(echo "$COMMENT" | grep -oP '(?<=--model\s)\S+' || echo "")
          NO_LLM=$(echo "$COMMENT" | grep -q '\-\-no-llm' && echo "true" || echo "false")
          echo "llm_model=${MODEL}" >> "$GITHUB_OUTPUT"
          echo "no_llm=${NO_LLM}" >> "$GITHUB_OUTPUT"

      - name: Run pgreviewer (JSON report)
        run: |
          set -o pipefail
          uv run pgr diff /tmp/pr.diff --json | tee /tmp/report.json
        env:
          DATABASE_URL: ${{ inputs.database-url }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ steps.model.outputs.llm_model }}
          LLM_DISABLED: ${{ steps.model.outputs.no_llm }}
        continue-on-error: true

      - name: Post PR comment and inline suggestions
        if: always()
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token || secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          COMMIT_SHA: ${{ steps.pr.outputs.head_sha }}
        run: |
          uv run python - <<'PYEOF'
          import json, os, sys
          from pathlib import Path

          try:
              data = json.loads(Path("/tmp/report.json").read_text())
          except Exception as exc:
              print(f"Could not read report: {exc}", file=sys.stderr)
              sys.exit(0)

          from pgreviewer.reporting.comment_manager import (
              post_or_update_comment,
              post_review_with_suggestions,
          )
          from pgreviewer.reporting.diff_comment import format_diff_comment

          pr_number = int(os.environ["PR_NUMBER"])
          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          commit_sha = os.environ["COMMIT_SHA"]

          has_issues = (
              any(r.get("issues") for r in data.get("results", []))
              or any(e.get("model_issues") for e in data.get("model_diffs", []))
              or bool(data.get("cross_cutting_findings"))
              or bool(data.get("code_pattern_issues"))
          )

          # Always post in on-demand mode — the user explicitly requested a review.
          post_or_update_comment(
              pr_number=pr_number, repo=repo, token=token,
              body=format_diff_comment(data),
          )
          if has_issues:
              post_review_with_suggestions(
                  pr_number=pr_number, repo=repo, token=token,
                  report=data, commit_sha=commit_sha,
                  diff_path="/tmp/pr.diff",
              )
          print("PR comment posted.")
          PYEOF

      # Reads already-generated JSON — does NOT re-run the analysis.
      - name: Enforce severity threshold
        id: threshold
        run: |
          python - <<'EOF'
          import json, sys
          from pathlib import Path
          data = json.loads(Path("/tmp/report.json").read_text())
          criticals = (
              sum(1 for r in data.get("results", []) for i in r.get("issues", []) if i.get("severity") == "CRITICAL")
              + sum(1 for e in data.get("model_diffs", []) for i in e.get("model_issues", []) if i.get("severity") == "CRITICAL")
              + sum(1 for f in data.get("cross_cutting_findings", []) if f.get("severity") == "CRITICAL")
              + sum(1 for i in data.get("code_pattern_issues", []) if i.get("severity") == "CRITICAL")
          )
          print(f"Severity threshold: critical. Found: {criticals} critical. Result: {'FAIL' if criticals else 'PASS'}")
          sys.exit(1 if criticals else 0)
          EOF

      # Swap 👀 for 🚀 (pass) or 😕 (criticals found). Always runs.
      - name: Update reaction (analysis done)
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REACTION_ID: ${{ steps.ack.outputs.reaction_id }}
          OUTCOME: ${{ steps.threshold.outcome }}
        run: |
          COMMENT_ID=${{ github.event.comment.id }}
          REPO=${{ github.repository }}

          if [ -n "$REACTION_ID" ]; then
            gh api "repos/$REPO/issues/comments/$COMMENT_ID/reactions/$REACTION_ID" \
              --method DELETE -H "Accept: application/vnd.github+json" 2>/dev/null || true
          fi

          FINAL_REACTION="rocket"
          [ "$OUTCOME" != "success" ] && FINAL_REACTION="confused"

          gh api "repos/$REPO/issues/comments/$COMMENT_ID/reactions" \
            --method POST -H "Accept: application/vnd.github+json" \
            -f content="$FINAL_REACTION"
