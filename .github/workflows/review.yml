name: pgReviewer (reusable)

# Public reusable workflow — consumers call:
#
#   uses: BrenoAlberto/pgReviewer/.github/workflows/review.yml@main
#
# Caller workflow needs these triggers and permissions:
#
#   on:
#     pull_request: { types: [opened, synchronize] }
#   permissions:
#     contents: read
#     issues: write
#     pull-requests: write
#     id-token: write   # required for pgreviewer-ci[bot] identity via token vending service

on:
  workflow_call:
    secrets:
      ANTHROPIC_API_KEY:
        description: "Anthropic API key (used when LLM_PROVIDER=anthropic)"
        required: false
      OPENAI_API_KEY:
        description: "OpenAI API key (used when LLM_PROVIDER=openai)"
        required: false
      GEMINI_API_KEY:
        description: "Google Gemini API key (used when LLM_PROVIDER=gemini)"
        required: false
      LLM_API_KEY:
        description: "Generic fallback API key — prefer provider-specific secrets above"
        required: false

jobs:
  # ── Welcome comment ─────────────────────────────────────────────────────────
  # Posts when a PR is first opened so reviewers know pgReviewer is active.
  welcome:
    name: Post pgReviewer welcome
    if: github.event_name == 'pull_request' && github.event.action == 'opened'
    runs-on: ubuntu-latest
    steps:
      - name: Get pgreviewer-ci token
        id: bot-token
        run: |
          OIDC_RESPONSE=$(curl -s \
            -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=pgreviewer-token-service" 2>/dev/null) || true
          OIDC_TOKEN=$(echo "$OIDC_RESPONSE" | jq -r '.value // empty' 2>/dev/null) || true
          if [ -z "$OIDC_TOKEN" ]; then
            echo "::warning::Could not obtain OIDC token — id-token:write permission may be missing. Response: $OIDC_RESPONSE"
            echo "token=" >> "$GITHUB_OUTPUT"
            echo "app_installed=false" >> "$GITHUB_OUTPUT"
            echo "missing_permission=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          RESPONSE=$(curl -s -X POST \
            https://pgreviewer-token-service.brenoapsdev.workers.dev/token \
            -H "Authorization: Bearer $OIDC_TOKEN" 2>/dev/null) || true
          TOKEN=$(echo "$RESPONSE" | jq -r '.token // empty' 2>/dev/null) || true
          if [ -z "$TOKEN" ]; then
            echo "::warning::pgreviewer-ci token exchange failed: $RESPONSE"
            echo "token=" >> "$GITHUB_OUTPUT"
            echo "app_installed=false" >> "$GITHUB_OUTPUT"
            echo "missing_permission=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
          echo "app_installed=true" >> "$GITHUB_OUTPUT"
          echo "missing_permission=false" >> "$GITHUB_OUTPUT"

      - name: Post welcome comment
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token || secrets.GITHUB_TOKEN }}
          APP_INSTALLED: ${{ steps.bot-token.outputs.app_installed }}
          MISSING_PERMISSION: ${{ steps.bot-token.outputs.missing_permission }}
        run: |
          cat > /tmp/pgr_welcome.md << 'BODYEOF'
          👋 **pgReviewer** is watching this PR.

          Static analysis runs automatically on every push — results appear as a comment when issues are found.

          **Checks:** missing FK indexes · dangerous DDL (locks) · N+1 queries · cross-cutting migration/query conflicts
          BODYEOF

          if [ "${APP_INSTALLED}" != "true" ] && [ "${MISSING_PERMISSION}" != "true" ]; then
            cat >> /tmp/pgr_welcome.md << 'BODYEOF'

          ---
          ⚠️ **pgreviewer-ci** is not installed on this repository and may not work as expected. [Install it here](https://github.com/apps/pgreviewer-ci).
          BODYEOF
          fi

          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body-file /tmp/pgr_welcome.md

  # ── Auto static review ───────────────────────────────────────────────────────
  # Fires automatically on every PR push (no DB required).
  # Runs pgr diff in STATIC_ONLY mode and posts/updates a summary comment when
  # issues are found.
  static-review:
    name: pgReviewer auto static analysis
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Get pgreviewer-ci token
        id: bot-token
        run: |
          OIDC_RESPONSE=$(curl -s \
            -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=pgreviewer-token-service" 2>/dev/null) || true
          OIDC_TOKEN=$(echo "$OIDC_RESPONSE" | jq -r '.value // empty' 2>/dev/null) || true
          if [ -z "$OIDC_TOKEN" ]; then
            echo "::warning::Could not obtain OIDC token — id-token:write permission may be missing."
            echo "token=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          RESPONSE=$(curl -s -X POST \
            https://pgreviewer-token-service.brenoapsdev.workers.dev/token \
            -H "Authorization: Bearer $OIDC_TOKEN" 2>/dev/null) || true
          TOKEN=$(echo "$RESPONSE" | jq -r '.token // empty' 2>/dev/null) || true
          if [ -z "$TOKEN" ]; then
            echo "::warning::pgreviewer-ci token exchange failed: $RESPONSE"
            echo "token=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch PR diff and head SHA
        id: pr
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token || secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          HEAD_SHA=${{ github.event.pull_request.head.sha }}
          git fetch origin "$HEAD_SHA"
          git checkout "$HEAD_SHA"
          gh pr diff $PR_NUMBER > /tmp/pr.diff
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install pgreviewer
        run: |
          uv venv /tmp/pgr-venv
          uv pip install --python /tmp/pgr-venv "pgreviewer[llm] @ git+https://github.com/BrenoAlberto/pgReviewer.git@feat/comment-ux-303"

      - name: Run pgreviewer static analysis (JSON report)
        run: |
          set -o pipefail
          SCHEMA_FLAG=""
          if [ -f ".pgreviewer/schema.sql" ]; then
            SCHEMA_FLAG="--schema .pgreviewer/schema.sql"
            echo "Schema file found — running in schema-aware mode."
          fi
          # shellcheck disable=SC2086
          /tmp/pgr-venv/bin/pgr diff /tmp/pr.diff --json $SCHEMA_FLAG | tee /tmp/report.json
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        continue-on-error: true

      - name: Post static analysis comment (issues only)
        if: always()
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token || secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          COMMIT_SHA: ${{ steps.pr.outputs.head_sha }}
        run: |
          /tmp/pgr-venv/bin/python - <<'PYEOF'
          import json, os, sys
          from pathlib import Path

          try:
              data = json.loads(Path("/tmp/report.json").read_text())
          except Exception as exc:
              print(f"Could not read report: {exc}", file=sys.stderr)
              sys.exit(0)

          from pgreviewer.reporting.comment_manager import (
              post_or_update_comment,
              post_review_with_suggestions,
          )
          from pgreviewer.reporting.diff_comment import format_diff_comment

          pr_number = int(os.environ["PR_NUMBER"])
          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          commit_sha = os.environ["COMMIT_SHA"]

          has_issues = (
              any(r.get("issues") for r in data.get("results", []))
              or any(e.get("model_issues") for e in data.get("model_diffs", []))
              or bool(data.get("cross_cutting_findings"))
              or bool(data.get("code_pattern_issues"))
          )

          always_comment = os.environ.get("ALWAYS_COMMENT", "").lower() in ("1", "true", "yes")

          # Auto-trigger mode: post when issues found, or always if ALWAYS_COMMENT set.
          # On re-push (synchronize), the existing comment is updated in place.
          if has_issues or always_comment:
              post_or_update_comment(
                  pr_number=pr_number, repo=repo, token=token,
                  body=format_diff_comment(data),
              )
              if has_issues:
                  post_review_with_suggestions(
                      pr_number=pr_number, repo=repo, token=token,
                      report=data, commit_sha=commit_sha,
                      diff_path="/tmp/pr.diff",
                  )
              print("Static analysis comment posted.")
          else:
              print("No issues found — skipping comment (set ALWAYS_COMMENT=true to override).")
          PYEOF
