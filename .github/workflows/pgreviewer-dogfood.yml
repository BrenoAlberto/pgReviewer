name: pgreviewer self-review

on:
  pull_request:
    paths:
      - "db/migrations/**.sql"
      - "db/fixtures/**.sql"
      - "pgreviewer/models/**"

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  pgreviewer:
    name: pgreviewer SQL analysis
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://pgreviewer:pgreviewer@127.0.0.1:5432/review_db

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Build the local postgres+hypopg image from db/Dockerfile
      - name: Build test database image
        run: docker build -t pgreviewer-db db/

      - name: Start Postgres with HypoPG
        run: |
          docker run -d --name pgreviewer-db \
            -e POSTGRES_USER=pgreviewer \
            -e POSTGRES_PASSWORD=pgreviewer \
            -e POSTGRES_DB=review_db \
            -p 5432:5432 \
            pgreviewer-db
          for i in $(seq 1 30); do
            pg_isready -h 127.0.0.1 -p 5432 -U pgreviewer && break
            sleep 1
          done

      - name: Enable HypoPG
        run: |
          PGPASSWORD=pgreviewer psql -h 127.0.0.1 -U pgreviewer -d review_db \
            -c "CREATE EXTENSION IF NOT EXISTS hypopg;"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install pgreviewer
        run: uv sync

      - name: Download PR diff
        run: gh pr diff ${{ github.event.pull_request.number }} > /tmp/pr.diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run pgreviewer (JSON report)
        run: uv run pgr diff /tmp/pr.diff --json > /tmp/report.json
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        continue-on-error: true

      - name: Post PR comment
        if: always()
        run: |
          uv run python - <<'PYEOF'
          import json, os, sys
          from pathlib import Path

          try:
              data = json.loads(Path("/tmp/report.json").read_text())
          except Exception as exc:
              print(f"Could not read report: {exc}", file=sys.stderr)
              sys.exit(0)

          from pgreviewer.reporting.comment_manager import post_or_update_comment
          from pgreviewer.reporting.pr_comment import REPORT_SIGNATURE

          results = data.get("results", [])
          model_diffs = data.get("model_diffs", [])
          skipped = data.get("skipped", [])

          all_issues = [i for r in results for i in r.get("issues", [])]
          critical = sum(1 for i in all_issues if i["severity"] == "CRITICAL")
          warning  = sum(1 for i in all_issues if i["severity"] == "WARNING")

          badge = "🔴 CRITICAL" if critical else ("🟡 WARNING" if warning else "🟢 PASS")
          lines = [REPORT_SIGNATURE, f"## pgreviewer — {badge}", ""]
          lines += [f"**{critical} critical · {warning} warning**", ""]

          for result in results:
              if result["overall_severity"] == "PASS":
                  continue
              lines.append(f"### `{result['source_file']}` (line {result['line_number']})")
              for issue in result.get("issues", []):
                  lines.append(f"- **{issue['severity']}** `{issue['detector_name']}`: {issue['description']}")
                  if issue.get("suggested_action"):
                      lines.append(f"  > 💡 {issue['suggested_action']}")
              lines.append("")

          for entry in model_diffs:
              issues = entry.get("model_issues", [])
              if not issues:
                  continue
              lines.append(f"### `{entry['file']}` (model changes)")
              for issue in issues:
                  lines.append(f"- **{issue['severity']}** `{issue['detector_name']}`: {issue['description']}")
                  if issue.get("suggested_action"):
                      lines.append(f"  > 💡 {issue['suggested_action']}")
              lines.append("")

          if not critical and not warning:
              lines.append("No issues found. ✅")

          if skipped:
              lines += ["<details><summary>Skipped files</summary>", ""]
              for s in skipped:
                  lines.append(f"- `{s['file']}`: {s['reason']}")
              lines += ["", "</details>"]

          post_or_update_comment(
              pr_number=int(os.environ["PR_NUMBER"]),
              repo=os.environ["GITHUB_REPOSITORY"],
              token=os.environ["GH_TOKEN"],
              body="\n".join(lines),
          )
          print("PR comment posted.")
          PYEOF
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}

      - name: Enforce severity threshold
        run: uv run pgr diff /tmp/pr.diff --ci
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
