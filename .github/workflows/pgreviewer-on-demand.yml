name: pgreviewer self-review (on-demand)

# pgReviewer dogfoods its own reusable workflow.
# This file is also the live example shown in the README.
on:
  issue_comment:
    types: [created]
  pull_request:
    types: [opened]

permissions:
  contents: read
  issues: write
  pull-requests: write
  checks: write

jobs:
  pgreviewer:
    uses: BrenoAlberto/pgReviewer/.github/workflows/review.yml@main
    secrets: inherit
    with:
      database-url: postgresql://pgreviewer:pgreviewer@127.0.0.1:5432/review_db
