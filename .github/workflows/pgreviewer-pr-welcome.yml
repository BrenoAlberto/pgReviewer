name: pgreviewer PR welcome

# Post a single welcome comment when a PR is opened so reviewers always
# know how to trigger on-demand analysis — no need to remember the command.
on:
  pull_request:
    types: [opened]

permissions:
  pull-requests: write

jobs:
  welcome:
    name: Post /pgr review hint
    runs-on: ubuntu-latest
    steps:
      - name: Post welcome comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body "$(cat <<'EOF'
          👋 **pgReviewer** is watching this PR.

          Comment `/pgr review` at any time to run a full SQL & migration analysis

          Results are posted as a summary comment + inline review suggestions on the changed files.
          EOF
          )"
